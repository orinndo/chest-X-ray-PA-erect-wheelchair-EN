<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chest X-ray PA Erect Wheelchair Audio Guide</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
background:linear-gradient(180deg,#f7fbff,#eef6ff);color:#0f172a;}
.header{padding:18px 16px 10px;}
.frame-title{border:2px solid #38bdf8;padding:14px 16px;border-radius:14px;background:#f8fcff;text-align:center;}
.frame-title h1{margin:0;font-size:20px;}
.frame-title p{margin:6px 0 0;font-size:14px;color:#475569;}
.note{font-size:12px;color:#475569;margin:12px 16px;}
.main{margin:0 16px 24px;padding:16px;background:#fff;border-radius:18px;box-shadow:0 8px 18px rgba(15,23,42,.08);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select{flex:1;max-width:100%;font-size:16px;padding:10px 36px 10px 12px;border-radius:12px;border:1px solid #cbd5f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
button{font-size:15px;padding:10px 14px;border-radius:12px;border:1px solid #cbd5f5;background:#eff6ff;}
button:active{transform:scale(.98);}
.label{margin-top:14px;font-size:13px;color:#475569;}
.jp{font-size:18px;font-weight:600;margin-top:6px;}
.en{font-size:16px;margin-top:4px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
audio{width:100%;margin-top:10px;}
.status{margin-top:8px;font-size:13px;color:#475569;}
.hint{margin-top:10px;font-size:12px;color:#64748b;}
</style>
</head>
<body>
<div class="header">
  <div class="frame-title">
    <h1>胸部立位正面 車椅子（Chest X-ray）</h1>
    <p>English Audio Guide</p>
  </div>
</div>

<p class="note">※ iPhone / iPad / Android で再生できます。最初は「再生」を押してください。</p>

<div class="main">
  <div class="row">
    <select id="sel"></select>
    <button id="prev">← 前</button>
    <button id="next">次 →</button>
  </div>

  <div class="label">日本語（内容）</div>
  <div class="jp" id="jp"></div>

  <div class="label">English Script</div>
  <div class="en" id="en"></div>

  <div class="controls">
    <button id="play">▶︎ 再生</button>
    <button id="pause">⏸ 一時停止</button>
    <button id="replay">↻ もう一度</button>
  </div>

  <div class="status" id="status">待機中 / Ready</div>
  <audio id="player" controls></audio>

  <div class="hint">
    再生できない場合：消音モード解除、音量、Bluetooth接続を確認してください。
  </div>
</div>

<script>
const STEPS = [
 {preview:"すみません、少しよろしいですか？", jp:"すみません、少しよろしいですか？", en:"Excuse me, may I have a moment of your time?"},
 {preview:"こちらをご覧ください。これはあな…", jp:"こちらをご覧ください。これはあなたのお名前と生年月日で合っていますか？", en:"Please check here. Is this your name and date of birth?"},
 {preview:"お名前と生年月日を教えていただけ…", jp:"お名前と生年月日を教えていただけますか？", en:"Could you please tell me your name and date of birth?"},
 {preview:"これから胸部レントゲンを撮影しま…", jp:"これから胸部レントゲンを撮影します。", en:"We are going to take a chest X-ray now."},
 {preview:"簡単な日本語は理解できますか？", jp:"簡単な日本語は理解できますか？", en:"Do you understand simple Japanese?"},
 {preview:"英語の音声ガイドを使用します…", jp:"（通訳不在時）英語の音声ガイドで検査を説明します。音声の指示に従ってください。", en:"We will explain the examination using an English audio guide. Please follow the audio instructions."},
 {preview:"英語通訳を呼びますのでお待ち…", jp:"英語を話せる通訳を呼びますので、しばらくお待ちください。", en:"We will call an English-speaking interpreter. Please wait a moment."},
 {preview:"どうぞお入りください。", jp:"どうぞお入りください。", en:"Please come in."},
 {preview:"金属やプラスチック、湿布などを外…", jp:"身につけている金属やプラスチック製品、湿布などを外してください。", en:"Please remove any metal items, plastic items, and medicated patches from your body."},
 {preview:"更衣室は17番受付の隣にあります…", jp:"（着替えが必要な場合）更衣室は17番受付の隣にあります。検査着は更衣室にありますので、更衣室で着替えてください。着替え終わったらここに戻ってきてください。", en:"The changing room is next to reception desk number 17. Examination gowns are in the changing room. Please change there, and come back here when you are finished."},
 {preview:"車椅子から立つことはできますか…", jp:"車椅子から立つことはできますか？", en:"Are you able to stand up from the wheelchair?"},
 {preview:"ゆっくり立ってください…", jp:"ゆっくり立ってください。", en:"Please stand up slowly."},
 {preview:"あごをここにのせてください。", jp:"あごをここにのせてください。", en:"Please place your chin here."},
 {preview:"あごは乗せなくて大丈夫です…", jp:"あごはここに乗せなくて大丈夫です。上を向くだけで大丈夫です。", en:"You do not need to place your chin here. Just look up, please."},
 {preview:"両手で機械を抱えるようにしてくだ…", jp:"両手で機械を抱えるようにしてください。", en:"Please hold the machine with both arms, as if you are hugging it."},
 {preview:"両手でこの取手を握ってください…", jp:"両手でこの取手を握ってください。", en:"Please hold this handle with both hands."},
 {preview:"動かないでください。", jp:"動かないでください。", en:"Please do not move."},
 {preview:"大きく息を吸って、止めてください…", jp:"大きく息を吸って、止めてください。", en:"Take a deep breath in and hold it."},
 {preview:"楽にしてください。", jp:"楽にしてください。", en:"You can relax now."},
 {preview:"検査は終わりました。", jp:"検査は終わりました。", en:"The examination is finished."},
 {preview:"ゆっくり座ってください…", jp:"ゆっくり車椅子に座ってください。", en:"Please sit back down in the wheelchair slowly."},
 {preview:"次は診察がありますので、10番へ…", jp:"次は診察がありますので、10番へ行ってこのファイルを提出してください。", en:"Next, you will see the doctor. Please go to number 10 and hand in this file."},
 {preview:"19番または20番の前でお待ちくださ…", jp:"19番または20番の検査室の前でお待ちください。", en:"Please wait in front of examination room number 19 or 20."},
 {preview:"23番の前でお待ちください。", jp:"23番の検査室の前でお待ちください。", en:"Please wait in front of examination room number 23."},
 {preview:"16番の前でお待ちください。", jp:"16番の検査室の前でお待ちください。", en:"Please wait in front of examination room number 16."},
 {preview:"もう着替えてもいいですよ。", jp:"（着替えていい場合）もう着替えてもいいですよ。", en:"You may change back into your clothes now."},
 {preview:"まだ他の検査が残っています。", jp:"（他検査がある場合）まだ他の検査が残っています。", en:"There are still other examinations remaining."},
 {preview:"まだ着替えないでください。", jp:"（他検査がある場合）まだ着替えないでください。", en:"Please do not change back into your clothes yet."},
];

const sel=document.getElementById('sel'),
jp=document.getElementById('jp'),
en=document.getElementById('en'),
player=document.getElementById('player'),
status=document.getElementById('status');

STEPS.forEach((s,i)=>{
 const o=document.createElement('option');
 o.value=i;
 o.textContent=`${String(i+1).padStart(2,'0')}｜${s.jp}`;
 sel.appendChild(o);
});

let idx=0;
function load(i){
 idx=Math.max(0,Math.min(STEPS.length-1,i));
 sel.value=idx;
 jp.textContent=STEPS[idx].jp;
 en.textContent=STEPS[idx].en;
 player.src=`audio/step_${String(idx+1).padStart(2,'0')}.m4a`;
 status.textContent="待機中 / Ready";
}
sel.onchange=()=>load(parseInt(sel.value));
document.getElementById('prev').onclick=()=>load(idx-1);
document.getElementById('next').onclick=()=>load(idx+1);
document.getElementById('play').onclick=()=>player.play();
document.getElementById('pause').onclick=()=>player.pause();
document.getElementById('replay').onclick=()=>{player.currentTime=0;player.play();}
player.onplay=()=>status.textContent="再生中 / Playing";
player.onpause=()=>status.textContent="一時停止 / Paused";
player.onended=()=>status.textContent="待機中 / Ready";
load(0);
</script>
</body>
</html>
